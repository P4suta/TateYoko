# Toolchain managed by mise; `mise install` sets up the environment.
#
# mise's job here is purely to pin the toolchain. Developer commands live in the
# justfile (the single source of truth shared by local dev and CI) — run them with
# `mise exec -- just <recipe>` (or `just <recipe>` with mise activated).
[tools]
dotnet = "10.0.300"
# Command runner. Pinned like dotnet so CI and every machine get the same just.
just = "1.54.0"

# Host-side helper (Git hooks). Not needed for the build itself.
lefthook = "latest"

[settings]
# Allow the dotnet backend's symlink strategy.
experimental = true
