# Conventional Commits enforcement for the lefthook commit-msg hook.
# Keeps commit messages well-formed for release-please's version + CHANGELOG
# derivation. The conventional style only; committed skips fixup!/merge commits.
style = "conventional"
subject_capitalized = false
imperative_subject = false
subject_length = 0
line_length = 0
allowed_types = [
  "feat",
  "fix",
  "perf",
  "docs",
  "refactor",
  "test",
  "chore",
  "ci",
  "build",
  "deps",
  "style",
  "revert",
]
