name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did and what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: input
    id: version
    attributes:
      label: Version
      description: From BUILDINFO.txt in the bundle, or the release tag.
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      description: e.g. Windows 11 24H2 (26100)
  - type: textarea
    id: pdf
    attributes:
      label: About the PDF (if relevant)
      description: >
        Is it a vertical-writing scan? How many pages? Portrait? Password-protected?
        A small sample PDF that reproduces the problem helps a lot (attach if you can share it).
