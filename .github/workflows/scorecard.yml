# OpenSSF Scorecard: weekly supply-chain posture scan (pinned dependencies, token
# permissions, branch protection, dangerous-workflow patterns, ...). Findings
# surface under Security > Code scanning; publish_results feeds the public
# Scorecard API that backs the README badge. Public repo only.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "41 5 * * 1" # Mondays
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the public Scorecard API (badge)
      contents: read
      actions: read # read workflow files for the token / pinned-deps checks
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
